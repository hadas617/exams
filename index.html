<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יום הולדת שמח!</title>

    <link rel="stylesheet" href="style.css">

    <script src="code.js" defer></script>
</head>
<body>
    <div id="start">
        <img id="dadText" src="assets/images/birthdayText.png" alt="">
        <img id="birthdayDad" src="assets/images/birthdayDad.png" alt="">
    </div>
    <div id="makingBd">
        <img id="momBallom" src="assets/images/momBallon.png">
        <img id="shmuelBallon" src="assets/images/shmuelBallon.png">
        <img id="hadasClown" src="assets/images/hadasClown.png">
        <img id="miriamEat" src="assets/images/miriamEat.png">
    </div>
    <div id="dadBd">
        <img id="dadCake" src="assets/images/dadCake.png">
        <img id="desk" src='assets/images/desk.png'>
        <img id="spoon" src="assets/images/spoon.png">
        <img id="cake" src="assets/images/cake.png">
        <div id="balloon-container"></div>
        <img id="arrow" src="assets/images/arrow.png">
    </div>
    <div id="sea">
        <div class="sea-container">
            <div class="wave-container">
                <img id="wave2" src="assets/images/wave2.png" alt="Back Wave">
                
                <img src="assets/images/fish.png" class="jumping-fish fish-1 between-waves" alt="Fish">
                <img src="assets/images/fish.png" class="jumping-fish fish-3 between-waves" alt="Fish">

                <div class="boat-container">
                    <img src="assets/images/boat.png" alt="Rocking Boat" class="rocking-boat">
                </div>
                
                <img id="wave1" src="assets/images/wave1.png" alt="Front Wave">

                <img src="assets/images/fish.png" class="jumping-fish fish-2 in-front" alt="Fish">
            </div>
        </div>

        <div class="sun-container">
            <img src="assets/images/sun.png" alt="Bouncing Sun" class="bouncing-sun">
        </div>

        <img src="assets/images/seagulle.png" class="seagull" alt="Seagull">
        <img src="assets/images/seagulle.png" class="seagull delay-1" alt="Seagull">
        <img src="assets/images/seagulle.png" class="seagull delay-2" alt="Seagull">
        </div>
    <div id="map">
        <img class="continent" id="europe" src="assets/images/continents/europe.png">
        <header id="europeText">אירופה</header>
        <img class="continent" id="australia" src="assets/images/continents/australia.png">
        <header id="australiaText">אוסטרליה</header>
        <img class="continent" id="asia" src="assets/images/continents/asia.png">
        <header id="asiaText">אסיה</header>
        <img class="continent" id="africa" src="assets/images/continents/africa.png">
        <header id="africaText">אפריקה</header>
        <img class="continent" id="nAmerica" src="assets/images/continents/nAmerica.png">
        <header id="nAmericaText">צפון אמריקה</header>
        <img class="continent" id="sAmerica" src="assets/images/continents/sAmerica.png">
        <header id="sAmericaText">דרום אמריקה</header>


        <img id="endButton" src="assets/images/endButton.png">
        <img id="endButtonHover" src="assets/images/endButtonHover.png">
    </div>
</body>
</html>
